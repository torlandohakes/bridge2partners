name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation
  pull-requests: write # Required for posting preview URLs
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EMAIL }}'
      - name: Deploy to Firebase PR Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EMAIL }}'
          projectId: 'bridge2partners-staging'
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
