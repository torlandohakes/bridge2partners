name: Deploy to Firebase Hosting on Production Release
on:
  push:
    branches:
      - production
permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Inject Production Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GOOGLE_AI_API_B2P }}" > .env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY_PROD }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=bridge2partners-prod.firebaseapp.com" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=bridge2partners-prod" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=bridge2partners-prod.firebasestorage.app" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID_PROD }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID_PROD }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID_PROD }}" >> .env.production
      - name: Deploy to Firebase Production Environment
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          FIREBASE_TOKEN: '${{ secrets.FIREBASE_TOKEN_PROD }}'
        run: firebase deploy --only hosting,firestore --project bridge2partners-prod --non-interactive --force
